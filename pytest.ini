[pytest]
pythonpath = .
testpaths = tests
# Tests: optional env ``HAROMA_SKIP_TORCH_TESTS=1`` skips torch-dependent cases;
# see ``tests/_import_guard.py`` (subprocess torch probe + sentence_transformers stub).
# Example fast CI: pytest -m "not integration and not torch"
markers =
    integration: requires running server or external services
    torch: needs a working PyTorch (skipped when subprocess import fails or HAROMA_SKIP_TORCH_TESTS=1)
# llama-cpp-python SWIG bindings trigger importlib DeprecationWarning on 3.12+;
# upstream issue, not HaromaX6 code.
filterwarnings =
    ignore:builtin type SwigPyPacked has no __module__ attribute:DeprecationWarning
    ignore:builtin type SwigPyObject has no __module__ attribute:DeprecationWarning
    ignore:builtin type swigvarlink has no __module__ attribute:DeprecationWarning
